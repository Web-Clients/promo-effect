name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint frontend
        run: npm run lint || true

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests with coverage
        run: npm run test:coverage

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint || true

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm test

  max-file-lines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no file exceeds 800 lines
        run: |
          LARGE_FILES=$(find . -name '*.ts' -o -name '*.tsx' | grep -v node_modules | grep -v dist | xargs wc -l | awk '$1 > 800 && !/total/' | sort -rn)
          if [ -n "$LARGE_FILES" ]; then
            echo "::warning::Files exceeding 800 lines (will be fixed in Phase 3):"
            echo "$LARGE_FILES"
          fi
